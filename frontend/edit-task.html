<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Task | TaskFlow</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      TaskFlow
    </a>
    <ul class="navbar-nav" id="navbar-content"></ul>
  </nav>

  <div class="container">
    <div class="page-header">
      <div><h1>Edit Task</h1><p>Editing task in <strong id="project-name"></strong></p></div>
      <a id="back-btn" href="/projects.html" class="btn btn-secondary">← Back</a>
    </div>
    <div class="form-container">
      <div class="card" style="cursor:default">
        <form id="task-form">
          <div class="form-group">
            <label for="title">Task Title</label>
            <input type="text" class="form-control" id="title" required>
          </div>
          <div class="form-group">
            <label for="description">Description (optional)</label>
            <textarea class="form-control" id="description" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select class="form-control" id="status">
              <option value="To Do">To Do</option>
              <option value="In Progress">In Progress</option>
              <option value="Done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label for="assigned_to">Assign To</label>
            <select class="form-control" id="assigned_to"><option value="">Unassigned</option></select>
          </div>
          <div class="form-group">
            <label for="due_date">Due Date (optional)</label>
            <input type="date" class="form-control" id="due_date">
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="update-btn">Update Task</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    const taskId = new URLSearchParams(window.location.search).get('id');
    let taskProjectId;

    (async () => {
      const user = await checkAuth();
      if (!user) return window.location.href = '/';
      renderNavbar(user);
      if (!taskId) return window.location.href = '/projects.html';

      try {
        const { task } = await API.getTask(taskId);
        taskProjectId = task.project_id;
        document.getElementById('back-btn').href = `/project.html?id=${taskProjectId}`;

        const proj = await API.getProject(taskProjectId);
        document.getElementById('project-name').textContent = proj.project.name;

        // Fill form
        document.getElementById('title').value = task.title;
        document.getElementById('description').value = task.description || '';
        document.getElementById('status').value = task.status;
        document.getElementById('due_date').value = task.due_date ? task.due_date.split('T')[0] : '';

        // Load members for assignee dropdown
        const members = await API.getMembers(taskProjectId);
        const sel = document.getElementById('assigned_to');
        (members.members || []).forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.users.id;
          opt.textContent = `${m.users.name} (${m.users.email})`;
          if (task.assigned_to === m.users.id) opt.selected = true;
          sel.appendChild(opt);
        });
      } catch (err) { showAlert(err.message, 'error'); }
    })();

    document.getElementById('task-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('update-btn');
      btn.textContent = 'Updating...'; btn.disabled = true;
      try {
        await API.updateTask(taskId, {
          title: document.getElementById('title').value,
          description: document.getElementById('description').value,
          status: document.getElementById('status').value,
          assigned_to: document.getElementById('assigned_to').value || null,
          due_date: document.getElementById('due_date').value || null,
        });
        window.location.href = `/project.html?id=${taskProjectId}`;
      } catch (err) {
        showAlert(err.message, 'error');
        btn.textContent = 'Update Task'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
